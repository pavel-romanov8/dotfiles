unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

set -g mouse on
setw -g mode-keys vi
set -s set-clipboard on
set -g allow-passthrough on
set -s extended-keys on
# Ubuntu terminals commonly report xterm-256color; enable extkeys there so
# modified Enter reaches apps like opencode when running inside tmux.
set -as terminal-features ",screen-256color:clipboard,tmux-256color:clipboard:extkeys,wezterm:clipboard:extkeys,xterm-256color:clipboard:extkeys"
set -ga update-environment WEZTERM_APPEARANCE

# Some terminal/tmux combinations flatten Shift+Enter before opencode can
# distinguish it. Normalize it to the CSI-u sequence opencode expects.
bind-key -n S-Enter if-shell '[ "#{pane_current_command}" = "opencode" ] || [ "#{window_name}" = "opencode" ]' "send-keys -H 1b 5b 31 33 3b 32 75" "send-keys S-Enter"

bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

unbind -T prefix Left
unbind -T prefix Down
unbind -T prefix Up
unbind -T prefix Right

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
